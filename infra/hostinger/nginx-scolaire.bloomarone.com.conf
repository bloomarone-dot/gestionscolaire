# Nginx sur le VPS Hostinger (hôte) — à installer dans /etc/nginx/sites-available/
# Le conteneur frontend Docker proxy déjà /auth, /health, etc. vers la gateway.
#
# Installation :
#   sudo cp infra/hostinger/nginx-scolaire.bloomarone.com.conf /etc/nginx/sites-available/scolaire.bloomarone.com
#   sudo ln -sf /etc/nginx/sites-available/scolaire.bloomarone.com /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d scolaire.bloomarone.com

upstream gestionscolaire_frontend {
    server 127.0.0.1:5180;
}

server {
    listen 80;
    listen [::]:80;
    server_name scolaire.bloomarone.com;

    location / {
        proxy_pass http://gestionscolaire_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

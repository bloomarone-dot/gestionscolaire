# Nginx VPS — bloomaroneschool.bloomarone.com → frontend Docker :5180
# Le frontend Docker proxy déjà /auth, /health, /eleves… vers la gateway.

upstream gestionscolaire_frontend {
    server 127.0.0.1:5180;
}

server {
    listen 80;
    listen [::]:80;
    server_name bloomaroneschool.bloomarone.com;

    location / {
        proxy_pass http://gestionscolaire_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

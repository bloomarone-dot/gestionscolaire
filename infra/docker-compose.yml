# Environnement de développement complet du SaaS Scolaire.
# Build context = racine du monorepo (..). Lancer depuis ce dossier :
#   docker compose up --build
#
# Services applicatifs ajoutés au fur et à mesure des phases. Pour l'instant :
# api-gateway + auth-service (service de référence). Les 8 autres suivront.

name: gestionscolaire

x-internal-secret: &internal_secret ${INTERNAL_SHARED_SECRET:-dev-internal-secret}
x-jwt-secret: &jwt_secret ${JWT_SECRET:-dev-jwt-secret-change-me}

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gs
      POSTGRES_PASSWORD: gs
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gs"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # console de gestion
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: ..
      dockerfile: services/api-gateway/Dockerfile
    environment:
      JWT_SECRET: *jwt_secret
      INTERNAL_SHARED_SECRET: *internal_secret
      CORS_ORIGINS: "http://localhost:5173,http://127.0.0.1:5173"
    ports:
      - "8080:8000"
    depends_on:
      - auth-service
    restart: unless-stopped

  auth-service:
    build:
      context: ..
      dockerfile: services/auth-service/Dockerfile
    environment:
      JWT_SECRET: *jwt_secret
      INTERNAL_SHARED_SECRET: *internal_secret
      DATABASE_URL: postgresql+psycopg2://gs:gs@postgres:5432/auth_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pg_data:

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/app/data
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: sqlite:////app/data/master.db
      TENANT_DB_DIR: /app/data/tenants
      SECRET_KEY: change-me-in-production
      SEED_DEMO_ON_START: "false"
      TZ: Africa/Douala
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  backend_data:

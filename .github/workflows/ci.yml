name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test-services:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies and run unit tests
        run: |
          pip install pytest httpx
          pip install -e ./libs/common
          for svc in auth-service personnel-service evaluations-service bulletins-service pedagogie-service eleves-service tenant-service referentiel-service notifications-service; do
            pip install -r "services/$svc/requirements.txt"
            echo "=== Testing $svc ==="
            PYTHONPATH="services/$svc" pytest "services/$svc/tests" -q
          done

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build

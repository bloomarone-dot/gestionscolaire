server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── Routes SPA (priorité : ne pas proxy vers le backend) ──
    location ^~ /admin/dashboard {
        try_files $uri /index.html;
    }
    location ^~ /professor/dashboard {
        try_files $uri /index.html;
    }
    location ^~ /superadmin {
        try_files $uri /index.html;
    }
    location = /login {
        try_files $uri /index.html;
    }
    location = /dashboard {
        try_files $uri /index.html;
    }
    location = /eleves {
        try_files $uri /index.html;
    }
    location = /notes {
        try_files $uri /index.html;
    }
    location = /bulletin {
        try_files $uri /index.html;
    }

    # ── API Backend ──
    location /auth/ {
        proxy_pass http://backend:8000/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /schools {
        proxy_pass http://backend:8000/schools;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /admin/ {
        proxy_pass http://backend:8000/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /professor/ {
        proxy_pass http://backend:8000/professor/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /notes/ {
        proxy_pass http://backend:8000/notes/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /bulletins/ {
        proxy_pass http://backend:8000/bulletins/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /superadmin/ {
        proxy_pass http://backend:8000/superadmin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /eleves/ {
        proxy_pass http://backend:8000/eleves/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /bulletin/ {
        proxy_pass http://backend:8000/bulletin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Fichiers statiques + fallback SPA
    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── API → API Gateway (microservices) ──
    # Tous les préfixes de services passent par la gateway, qui valide le JWT
    # et injecte le contexte tenant. Même origine → pas de CORS côté navigateur.
    location ~ ^/(auth|tenants|referentiel|pedagogie|personnel|eleves|evaluations|bulletins|notifications)(/|$) {
        proxy_pass http://api-gateway:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
    }

    # index.html — jamais mis en cache (évite une ancienne version du SPA)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        try_files $uri =404;
    }

    # Assets hashés — cache long
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Fallback SPA (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
